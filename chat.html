<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chat – ByteMentor</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0B0F1A; --bg-card: #111827; --border: #1F2937;
      --text: #E5E7EB; --muted: #9CA3AF;
      --primary: #3B82F6; --secondary: #22D3EE;
    }
    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; height: 100dvh; display: flex; overflow: hidden; }

    .sidebar {
      width: 272px; flex-shrink: 0;
      background: var(--bg-card); border-right: 1px solid var(--border);
      display: flex; flex-direction: column;
      position: relative; z-index: 50;
      transition: transform 0.3s;
    }
    .sidebar-top { padding: 14px; border-bottom: 1px solid var(--border); }
    .new-chat-btn {
      width: 100%; padding: 11px 14px;
      background: rgba(59,130,246,0.1); color: var(--primary);
      border: 1px solid rgba(59,130,246,0.25); border-radius: 12px;
      cursor: pointer; font-size: 0.875rem; font-weight: 600;
      display: flex; align-items: center; gap: 8px; transition: all 0.2s;
    }
    .new-chat-btn:hover { background: var(--primary); color: #fff; border-color: var(--primary); }
    .sidebar-body { flex: 1; padding: 14px; overflow-y: auto; }
    .mode-label { font-size: 0.68rem; font-weight: 700; letter-spacing: 0.08em; color: rgba(229,231,235,0.35); text-transform: uppercase; margin-bottom: 10px; padding: 0 4px; }
    .mode-btn {
      width: 100%; text-align: left; padding: 10px 12px; border-radius: 10px;
      cursor: pointer; border: 1px solid transparent;
      background: none; color: rgba(229,231,235,0.75);
      font-size: 0.875rem; transition: all 0.15s; margin-bottom: 4px;
    }
    .mode-btn:hover { background: rgba(255,255,255,0.04); }
    .mode-btn.active { background: rgba(59,130,246,0.1); border-color: rgba(59,130,246,0.3); color: var(--primary); }
    .mode-name { font-weight: 600; display: block; }
    .mode-desc { font-size: 0.71rem; color: var(--muted); margin-top: 2px; display: block; }
    .mode-btn.active .mode-desc { color: rgba(59,130,246,0.7); }
    .sidebar-bottom { padding: 14px; border-top: 1px solid var(--border); }
    .back-link { display: flex; align-items: center; gap: 8px; color: var(--muted); font-size: 0.875rem; text-decoration: none; padding: 8px; border-radius: 8px; transition: all 0.15s; }
    .back-link:hover { color: var(--text); background: rgba(255,255,255,0.04); }

    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; position: relative; }

    header {
      height: 64px; display: flex; align-items: center; justify-content: space-between;
      padding: 0 20px; border-bottom: 1px solid rgba(31,41,55,0.7);
      background: rgba(11,15,26,0.9); backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 20; flex-shrink: 0;
    }
    .header-left { display: flex; align-items: center; gap: 10px; }
    .hamburger { display: none; background: none; border: none; color: var(--muted); cursor: pointer; padding: 8px; border-radius: 8px; font-size: 1.3rem; }
    .logo { display: flex; align-items: center; gap: 4px; font-size: 1.1rem; font-weight: 700; font-family: monospace; }
    .brace { color: var(--primary); }
    .wordmark { font-family: sans-serif; margin-left: 6px; }
    .mode-pill { display: flex; align-items: center; gap: 8px; padding: 5px 14px; border-radius: 999px; background: var(--bg-card); border: 1px solid var(--border); font-size: 0.75rem; font-weight: 600; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--secondary); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    .messages { flex: 1; overflow-y: auto; }
    .messages-inner { max-width: 740px; margin: 0 auto; padding: 32px 16px 140px; }

    .empty { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 60vh; text-align: center; max-width: 460px; margin: 0 auto; }
    .empty-icon { width: 64px; height: 64px; border-radius: 16px; border: 2px solid var(--primary); background: var(--bg-card); display: flex; align-items: center; justify-content: center; font-size: 1.8rem; margin-bottom: 24px; }
    .empty h2 { font-size: 1.4rem; font-weight: 800; margin-bottom: 10px; }
    .empty p { color: var(--muted); font-size: 0.95rem; line-height: 1.6; margin-bottom: 32px; }
    .suggestions { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
    .sug-btn { padding: 12px 14px; text-align: left; font-size: 0.85rem; border: 1px solid rgba(31,41,55,0.9); border-radius: 12px; background: var(--bg-card); color: rgba(229,231,235,0.9); cursor: pointer; transition: all 0.15s; }
    .sug-btn:hover { border-color: rgba(59,130,246,0.5); background: rgba(59,130,246,0.06); }

    .msg-row { display: flex; margin-bottom: 20px; }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.assistant { justify-content: flex-start; }
    .bubble {
      max-width: 80%; padding: 14px 18px; border-radius: 20px;
      font-size: 0.9375rem; line-height: 1.65;
    }
    .bubble.user { background: var(--primary); color: #fff; border-bottom-right-radius: 4px; }
    .bubble.assistant { background: var(--bg-card); border: 1px solid rgba(31,41,55,0.9); border-bottom-left-radius: 4px; }

    .code-block { margin: 12px 0; border-radius: 12px; overflow: hidden; border: 1px solid var(--border); background: #0D1117; }
    .code-label { padding: 6px 14px; font-size: 0.72rem; font-family: monospace; color: var(--muted); background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(31,41,55,0.6); }
    .code-block pre { padding: 14px; overflow-x: auto; }
    .code-block code { font-family: 'Fira Code', 'Cascadia Code', monospace; font-size: 0.85rem; color: var(--secondary); line-height: 1.5; }

    .typing { display: flex; gap: 5px; align-items: center; padding: 14px 18px; background: var(--bg-card); border: 1px solid rgba(31,41,55,0.9); border-radius: 20px; border-bottom-left-radius: 4px; width: fit-content; }
    .typing-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--primary); animation: bounce 1.2s infinite; }
    .typing-dot:nth-child(2) { animation-delay: 0.2s; }
    .typing-dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }

    .input-area {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0 16px 20px;
      background: linear-gradient(to top, var(--bg) 70%, transparent);
      padding-top: 40px;
    }
    .input-box {
      max-width: 740px; margin: 0 auto;
      display: flex; align-items: flex-end; gap: 8px;
      background: var(--bg-card); border: 1px solid rgba(31,41,55,0.9);
      border-radius: 18px; padding: 8px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .input-box:focus-within { border-color: rgba(59,130,246,0.5); box-shadow: 0 0 0 1px rgba(59,130,246,0.2); }
    textarea {
      flex: 1; resize: none; border: none; outline: none;
      background: transparent; color: var(--text);
      font-family: inherit; font-size: 0.9375rem; line-height: 1.5;
      padding: 8px 10px; min-height: 44px; max-height: 200px;
    }
    textarea::placeholder { color: var(--muted); }
    .send-btn {
      width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0;
      background: var(--primary); color: #fff; border: none;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; transition: all 0.2s; margin-bottom: 2px;
    }
    .send-btn:hover:not(:disabled) { opacity: 0.85; }
    .send-btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .input-hint { text-align: center; margin-top: 10px; font-size: 0.72rem; color: var(--muted); }

    .overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 40; backdrop-filter: blur(4px); }
    .overlay.show { display: block; }

    @media (max-width: 768px) {
      .sidebar { position: fixed; inset-y: 0; left: 0; transform: translateX(-100%); }
      .sidebar.open { transform: translateX(0); }
      .hamburger { display: flex; }
    }
  </style>
</head>
<body>

  <div class="overlay" id="overlay" onclick="closeSidebar()"></div>

  <div class="sidebar" id="sidebar">
    <div class="sidebar-top">
      <button class="new-chat-btn" onclick="newChat()">✏️ New Chat</button>
    </div>
    <div class="sidebar-body">
      <div class="mode-label">Learning Mode</div>
      <button class="mode-btn active" data-mode="beginner" onclick="setMode(this)">
        <span class="mode-name">Beginner</span>
        <span class="mode-desc">Step-by-step simple explanations.</span>
      </button>
      <button class="mode-btn" data-mode="intermediate" onclick="setMode(this)">
        <span class="mode-name">Intermediate</span>
        <span class="mode-desc">Best practices &amp; architecture.</span>
      </button>
      <button class="mode-btn" data-mode="exam" onclick="setMode(this)">
        <span class="mode-name">Exam Prep</span>
        <span class="mode-desc">Syllabus-aligned concepts &amp; tests.</span>
      </button>
      <button class="mode-btn" data-mode="debug" onclick="setMode(this)">
        <span class="mode-name">Debug</span>
        <span class="mode-desc">Laser-focused error resolution.</span>
      </button>
    </div>
    <div class="sidebar-bottom">
      <a href="index.html" class="back-link">← Back to Home</a>
    </div>
  </div>

  <div class="main">
    <header>
      <div class="header-left">
        <button class="hamburger" onclick="openSidebar()">☰</button>
        <div class="logo">
          <span class="brace">{</span><span>🧠</span><span class="brace">}</span>
          <span class="wordmark">ByteMentor</span>
        </div>
      </div>
      <div class="mode-pill">
        <div class="dot"></div>
        <span id="modePillLabel">Beginner Mode</span>
      </div>
    </header>

    <div class="messages" id="messages">
      <div class="messages-inner" id="messagesInner"></div>
    </div>

    <div class="input-area">
      <div class="input-box">
        <textarea id="inputBox" placeholder="Ask anything or paste code..." rows="1"
          oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>➤</button>
      </div>
      <div class="input-hint">ByteMentor can make mistakes. Always verify important code.</div>
    </div>
  </div>

  <script src="config.js"></script>
  <script src="chat.js"></script>
</body>
</html>
